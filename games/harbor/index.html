<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c1c26" />
  <meta name="description" content="HARBOR — grow a small fishing village into a vast industrial port, a metropolis, and a global trade empire. A living side-on port simulator. Free, no install." />
  <meta property="og:title" content="HARBOR" />
  <meta property="og:description" content="From fishing village to global port empire." />
  <title>HARBOR — port simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader"><div class="logo">HARBOR</div><div class="spinner" aria-label="Loading"></div></div>
  <div id="app">
    <header class="hud">
      <span class="brand">HARBOR</span>
      <span class="era" id="era-pill">Fishing Village</span>
      <span class="clock" id="clock">06:00</span>
    </header>
    <div class="board-wrap">
      <canvas id="game" aria-label="HARBOR port"></canvas>
    </div>
    <p class="hint" id="hint">Drag to travel the coast · pinch to zoom · twist to rotate</p>
  </div>
  <script src="../../shared/juice.js?v=1"></script>
  <script src="../../shared/retention.js?v=1"></script>
  <script src="../../shared/portal.js?v=1"></script>
  <script src="../../shared/progression.js?v=1"></script>
  <script src="../../shared/stage.js?v=1"></script>
  <script src="gl.js?v=15"></script>
  <script src="gltf.js?v=15"></script>
  <script src="biomes.js?v=15"></script>
  <script src="assets.js?v=15"></script>
  <script src="models.js?v=15"></script>
  <script src="sim.js?v=15"></script>
  <script src="game.js?v=15"></script>
</body>
</html>
