<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#051a0a" />
  <meta name="description" content="Guess the footballer in 6 tries. New player every day." />
  <meta property="og:title" content="Kickle — Prism Play" />
  <meta property="og:description" content="Daily football puzzle. 6 guesses. Clues for nationality, club, position, age, league and shirt number." />
  <title>Kickle — daily football puzzle · Prism Play</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="hud">
      <a class="brand" href="../../" aria-label="Back to Prism Play">KICKLE</a>
      <div class="hud-right">
        <div class="streak" id="streak">🔥 0&nbsp;day streak</div>
        <div class="mode-badge">Daily ⚽</div>
      </div>
    </header>

    <div class="legend">
      <span>NAT</span><span>CLUB</span><span>POS</span><span>AGE</span><span>LEAGUE</span><span>KIT</span>
    </div>

    <div id="guess-list" class="guess-list"></div>

    <p class="msg" id="msg"></p>

    <div class="search-wrap">
      <div id="dropdown" class="dropdown hidden"></div>
      <input id="search" class="search-input" type="text" placeholder="Type a player name…" autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>

    <p class="hint">Type a player → pick from list → see clues &nbsp;·&nbsp; <b>Green</b> = exact match &nbsp;·&nbsp; <b>Yellow</b> = close</p>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="panel">
        <h1 id="ov-title">⚽</h1>
        <div class="ov-player" id="ov-player"></div>
        <p id="ov-sub"></p>
        <div class="ov-scores">
          <div><span class="label">Guesses</span><b id="ov-guesses">0</b></div>
          <div><span class="label">Streak</span><b id="ov-streak">0</b></div>
        </div>
        <div class="ov-grid" id="ov-grid"></div>
        <div class="ov-actions">
          <button id="ov-share" class="cta secondary">Share result</button>
          <button id="ov-close" class="cta">Close</button>
          <p style="margin-top:10px;font-size:.85rem"><a href="/" style="color:var(--accent);text-decoration:none">&larr; All 10 Prism Play games</a></p>
        </div>
      </div>
    </div>
  </div>
  <script src="../../shared/juice.js?v=1"></script>
  <script src="../../shared/retention.js?v=1"></script>
  <script src="game.js?v=1"></script>
</body>
</html>
