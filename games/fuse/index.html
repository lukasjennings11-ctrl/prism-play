<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c1020" />
  <meta name="description" content="Draw a path to fuse matching tiles. Chain longer for bigger tiers. A fresh take on number-merge puzzles — no install needed." />
  <meta property="og:title" content="Fuse" />
  <meta property="og:description" content="Draw to connect matching tiles and chain them into bigger tiers." />
  <title>Fuse — chain-merge puzzle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader">
    <div class="logo">FUSE</div>
    <div class="spinner" aria-label="Loading"></div>
  </div>
  <div id="app">
    <header class="hud">
      <span class="brand">FUSE</span>
      <div class="scores">
        <div class="score"><span class="label">SCORE</span><span id="score">0</span></div>
        <div class="score"><span class="label">BEST</span><span id="best">0</span></div>
      </div>
    </header>
    <div class="subbar">
      <div class="goal" id="goal">Level 1</div>
      <div class="moves" id="moves">Moves 15</div>
      <div class="controls">
        <button id="menu" class="icon-btn" aria-label="Missions">☰</button>
        <button id="mute" class="icon-btn" aria-label="Toggle sound">🔊</button>
        <button id="new" class="text-btn">Restart</button>
      </div>
    </div>
    <div class="board-wrap">
      <canvas id="game" aria-label="Fuse game board"></canvas>
      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="panel">
          <h1 id="ov-title">Game Over</h1>
          <p id="ov-sub">No moves left.</p>
          <div class="ov-scores">
            <div><span class="label">SCORE</span><b id="ov-score">0</b></div>
            <div><span class="label">BEST</span><b id="ov-best">0</b></div>
          </div>
          <button id="ov-again" class="cta">Play again</button>
          <button id="ov-continue" class="cta secondary" style="display:none">Continue ▶</button>
        </div>
      </div>
    </div>
    <p class="hint">Drag across <b>touching tiles of the same number</b> — longer chains fuse into bigger tiers.</p>
  </div>
  <script src="../../shared/juice.js?v=2"></script>
  <script src="../../shared/retention.js?v=2"></script>
  <script src="../../shared/portal.js?v=2"></script>
  <script src="../../shared/progression.js?v=2"></script>
  <script src="../../shared/stage.js?v=2"></script>
  <script src="game.js?v=2"></script>
</body>
</html>
