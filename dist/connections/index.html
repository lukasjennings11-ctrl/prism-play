<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a14" />
  <title>Groups — daily category puzzle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="hud">
      <div class="brand">GROUPS</div>
      <div class="controls">
        <button id="mute" class="icon-btn" aria-label="Toggle sound">🔊</button>
        <button id="practice" class="text-btn">Practice</button>
      </div>
    </header>

    <div class="subbar">
      <div class="streak" id="streak">🔥 0&nbsp;day streak</div>
      <div class="mode-badge" id="mode-badge">Daily</div>
    </div>

    <div class="lives" id="lives"></div>

    <div class="solved-rows" id="solved-rows"></div>

    <div class="grid" id="grid"></div>

    <p class="msg" id="msg"></p>

    <div class="actions">
      <button id="deselect" class="text-btn">Deselect</button>
      <button id="shuffle" class="text-btn">Shuffle</button>
      <button id="submit" class="cta" style="flex:0 0 auto; padding:0 20px; height:36px;" disabled>Submit</button>
    </div>

    <p class="hint">Find 4 groups of 4 related words · <b>4 mistakes</b> allowed</p>

    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="panel">
        <h1 id="ov-title">Solved!</h1>
        <p id="ov-sub">Nice work.</p>
        <div class="ov-scores">
          <div><span class="label">Mistakes</span><b id="ov-mistakes">0</b></div>
          <div><span class="label">Streak</span><b id="ov-streak">0</b></div>
        </div>
        <div class="ov-actions">
          <button id="ov-share" class="cta secondary">Copy result</button>
          <button id="ov-close" class="cta">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="categories.js?v=1"></script>
  <script src="shared/juice.js?v=1"></script>
  <script src="shared/retention.js?v=1"></script>
  <script src="game.js?v=1"></script>
</body>
</html>
