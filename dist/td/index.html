<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#070d0a" />
  <meta name="description" content="Place turrets. Upgrade them. The waves don't stop — but neither do you." />
  <meta property="og:title" content="Outpost — PortMaster" />
  <meta property="og:description" content="Build and upgrade turrets, hold the line against endless waves." />
  <title>Outpost — tower defense · PortMaster</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <div id="loader"><div class="logo">OUTPOST</div><div class="spinner" aria-label="Loading"></div></div>
  <div id="app">
    <header class="hud">
      <span class="brand">OUTPOST</span>
      <div class="scores">
        <div class="score-box"><span class="label">WAVE</span><span id="wave">1</span></div>
        <div class="score-box"><span class="label">COINS</span><span id="coins">50</span></div>
        <div class="score-box"><span class="label">LIVES</span><span id="lives">10</span></div>
      </div>
    </header>
    <div class="subbar">
      <div class="streak" id="streak">🔥 0&nbsp;day streak</div>
      <div class="controls">
        <button id="mute" class="icon-btn" aria-label="Toggle sound">🔊</button>
        <button id="new"  class="text-btn">New</button>
      </div>
    </div>
    <div class="board-wrap">
      <canvas id="game" aria-label="Outpost game board"></canvas>
      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="panel">
          <h1 id="ov-title">Overrun!</h1>
          <p  id="ov-sub">Your outpost has fallen.</p>
          <div class="ov-scores">
            <div><span class="label">Wave</span><b id="ov-wave">1</b></div>
            <div><span class="label">Score</span><b id="ov-score">0</b></div>
            <div><span class="label">Best</span><b id="ov-best">0</b></div>
          </div>
          <button id="ov-again" class="cta">Play again</button>
          <button id="ov-share" class="cta secondary" style="display:none">Share score</button>
        </div>
      </div>
    </div>
    <p class="hint">Tap empty cells to <b>build</b> · tap turrets to <b>upgrade</b> · hold every wave</p>
  </div>
  <script src="shared/juice.js?v=1"></script>
  <script src="shared/retention.js?v=1"></script>
  <script src="shared/portal.js?v=1"></script>
  <script src="game.js?v=1"></script>
  <script>
  (function(){
    var btn = document.getElementById('ov-share');
    var overlay = document.getElementById('overlay');
    if (!btn || !overlay) return;
    new MutationObserver(function(){
      if (!overlay.classList.contains('hidden')) btn.style.display = '';
      else { btn.style.display = 'none'; btn.textContent = 'Share score'; }
    }).observe(overlay, {attributes:true, attributeFilter:['class']});
    btn.addEventListener('click', function(){
      var sc = (document.getElementById('ov-score')||{}).textContent || '?';
      var text = 'Outpost — ' + sc + ' pts!';
      if (navigator.share) { navigator.share({title:'Outpost',text:text}); }
      else if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ btn.textContent='Copied ✓'; setTimeout(function(){ btn.textContent='Share score'; },2000); }); }
    });
  })();
  </script>
</body>
</html>
