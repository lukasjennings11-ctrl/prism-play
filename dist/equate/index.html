<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f12" />
  <meta name="description" content="One equation hidden each day. Six guesses. Everyone gets the same board." />
  <meta property="og:title" content="Equate — PortMaster" />
  <meta property="og:description" content="Guess the hidden 8-character equation in 6 tries. New puzzle every day." />
  <title>Equate — daily equation puzzle · PortMaster</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <div id="loader"><div class="logo">EQUATE</div><div class="spinner" aria-label="Loading"></div></div>
  <div id="app">
    <header class="hud">
      <span class="brand">EQUATE</span>
      <div class="controls">
        <button id="mute" class="icon-btn" aria-label="Toggle sound">🔊</button>
        <button id="practice" class="text-btn">Practice</button>
      </div>
    </header>
    <div class="subbar">
      <div class="streak" id="streak">🔥 0&nbsp;day streak</div>
      <div class="mode-badge" id="mode-badge">Daily</div>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <p class="msg" id="msg"></p>
    <div class="keyboard" id="keyboard"></div>
    <p class="hint">Build a true equation (e.g. <b>3+5*2=13</b>) · <b>Enter</b> to check · one puzzle per day</p>
    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="panel">
        <h1 id="ov-title">Solved!</h1>
        <div class="word" id="ov-word">12+34=46</div>
        <p id="ov-sub">Nice work.</p>
        <div class="ov-scores">
          <div><span class="label">Guesses</span><b id="ov-guesses">0</b></div>
          <div><span class="label">Streak</span><b id="ov-streak">0</b></div>
        </div>
        <div class="ov-actions">
          <button id="ov-share" class="cta secondary">Copy result</button>
          <button id="ov-close" class="cta">Close</button>
        </div>
      </div>
    </div>
  </div>
  <script src="shared/juice.js?v=1"></script>
  <script src="shared/retention.js?v=1"></script>
  <script src="shared/portal.js?v=1"></script>
  <script src="game.js?v=1"></script>
</body>
</html>
