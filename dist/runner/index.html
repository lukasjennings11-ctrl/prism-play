<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#07101a" />
  <meta name="description" content="Switch your color to match each gate and phase through. Chain gates for speed combos. A fresh one-thumb color-runner — no install." />
  <meta property="og:title" content="Dash Lanes" />
  <meta property="og:description" content="Match your color to each gate and phase through. Chain for speed." />
  <title>Dash Lanes — color-switch runner</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <div id="loader"><div class="logo">DASH LANES</div><div class="spinner" aria-label="Loading"></div></div>
  <div id="app">
    <header class="hud">
      <span class="brand">DASH LANES</span>
      <div class="scores">
        <div class="score-box"><span class="label">SCORE</span><span id="score">0</span></div>
        <div class="score-box"><span class="label">BEST</span><span id="best">0</span></div>
      </div>
    </header>
    <div class="subbar">
      <div class="goal" id="goal">Level 1</div>
      <div class="combo" id="combo">x1</div>
      <div class="controls">
        <button id="menu" class="icon-btn" aria-label="Missions">☰</button>
        <button id="mute" class="icon-btn" aria-label="Toggle sound">🔊</button>
        <button id="new"  class="text-btn">Restart</button>
      </div>
    </div>
    <div class="board-wrap">
      <canvas id="game" aria-label="Dash Lanes game board"></canvas>
      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="panel">
          <h1 id="ov-title">Crashed!</h1>
          <p  id="ov-sub">Wrong color.</p>
          <div class="ov-scores">
            <div><span class="label">Score</span><b id="ov-score">0</b></div>
            <div><span class="label">Best</span><b id="ov-best">0</b></div>
          </div>
          <button id="ov-again" class="cta">Run again</button>
          <button id="ov-continue" class="cta secondary" style="display:none">Continue ▶</button>
        </div>
      </div>
    </div>
    <p class="hint">Tap <b>left / right</b> (or arrow keys) to switch color — match the gate to phase through.</p>
  </div>
  <script src="shared/juice.js?v=2"></script>
  <script src="shared/retention.js?v=2"></script>
  <script src="shared/portal.js?v=2"></script>
  <script src="shared/progression.js?v=2"></script>
  <script src="shared/stage.js?v=2"></script>
  <script src="game.js?v=2"></script>
</body>
</html>
